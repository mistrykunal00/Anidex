{% extends "base.html" %}

{% block content %}
<section class="dex-shell auth-shell">
    <div class="auth-head">
        <p class="eyebrow">Account</p>
        <h1>{{ "Sign In" if mode == "login" else "Create Account" }}</h1>
        <p class="region-subtitle">
            Save your discoveries across devices and keep your Region 1 progress in sync.
        </p>
    </div>

    {% if error %}
    <div class="auth-alert">{{ error }}</div>
    {% endif %}

    <div class="auth-grid">
        <form class="auth-card" method="post" action="{{ url_for('login') }}">
            <p class="auth-card-title">Sign In</p>
            <label>
                <span>Email</span>
                <input name="email" type="email" required placeholder="you@example.com">
            </label>
            <label>
                <span>Password</span>
                <input name="password" type="password" required placeholder="••••••••">
            </label>
            <button class="primary-button wide-button" type="submit">Sign In</button>
        </form>

        <form class="auth-card" method="post" action="{{ url_for('signup') }}">
            <p class="auth-card-title">Create Account</p>
            <label>
                <span>Username</span>
                <input name="username" type="text" required minlength="3" placeholder="AnidexFan">
            </label>
            <label>
                <span>Email</span>
                <input name="email" type="email" required placeholder="you@example.com">
            </label>
            <label>
                <span>Password</span>
                <input name="password" type="password" required minlength="6" placeholder="At least 6 characters">
            </label>
            <button class="ghost-button wide-button" type="submit">Create Account</button>
        </form>
    </div>

    <nav class="dex-nav" aria-label="Primary">
        <a class="dex-tab" href="{{ url_for('index') }}">Dex</a>
        <a class="dex-tab" href="{{ url_for('index') }}#region-1">Region 1</a>
        <a class="dex-tab" href="{{ url_for('scan') }}">Scan</a>
        <a class="dex-tab is-active" href="{{ url_for('login') }}">Profile</a>
    </nav>
</section>
{% endblock %}
