{% extends "base.html" %}

{% block content %}
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
<section class="dex-shell scan-shell" id="top">
    <header class="dex-top">
        <div class="device-lights" aria-hidden="true">
            <span class="light orb-blue"></span>
            <span class="light orb-red"></span>
            <span class="light orb-yellow"></span>
            <span class="light orb-green"></span>
        </div>
        <div class="speaker-lines" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </header>

    <section class="hero screen-panel">
        <div class="screen-header">
            <p class="eyebrow">Camera Mode</p>
            <span class="screen-dot"></span>
        </div>
        <div class="hero-copy">
            <h1>Region 1</h1>
            <p class="hero-text">
                Open your phone camera, frame an animal, and capture a shot to recognize it.
            </p>
        </div>
        <div class="hero-panel">
            <div class="stat-card">
                <span class="stat-label">Mode</span>
                <strong>Live</strong>
            </div>
            <div class="stat-card">
                <span class="stat-label">Tip</span>
                <strong>Use rear camera</strong>
            </div>
        </div>
    </section>

    <nav class="dex-nav" aria-label="Primary">
        <a class="dex-tab" href="/">Dex</a>
        <a class="dex-tab" href="/#region-1">Region 1</a>
        <a class="dex-tab is-active" href="/scan">Scan</a>
        <a class="dex-tab" href="{{ url_for('profile') if is_authenticated else url_for('login') }}">Profile</a>
    </nav>

    <section class="scan-stage control-panel">
        <div class="camera-frame">
            <video id="camera-preview" autoplay playsinline muted></video>
            <div class="camera-overlay" aria-hidden="true"></div>
        </div>
        <canvas id="capture-canvas" class="is-hidden"></canvas>
        <div class="scan-actions">
            <button id="start-camera" class="primary-button" type="button">Start Camera</button>
            <button id="capture-photo" class="ghost-button" type="button">Capture</button>
        </div>
        <div class="scan-actions">
            <button id="upload-scan" class="primary-button wide-button" type="button">Recognize Animal</button>
        </div>
        <div id="scan-status" class="scan-status">Camera is off.</div>
        <div id="scan-result" class="scan-result is-hidden">
            <strong id="detected-name"></strong>
            <p id="detected-note"></p>
            <div id="detected-alt" class="detected-alt"></div>
        </div>
        <div id="confirm-panel" class="confirm-panel is-hidden">
            <div class="confirm-label">Closest Dex match</div>
            <strong id="confirm-name"></strong>
            <p id="confirm-desc"></p>
            <div class="confirm-actions">
                <button id="confirm-found" class="primary-button" type="button">Confirm Found</button>
                <a id="open-entry" class="ghost-button" href="/">View Entry</a>
            </div>
        </div>
    </section>
</section>
{% endblock %}
